
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Booking - Client</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><span style="color:white;">Gymnatorium</span> <span style="color:orange;">Booking</span></h1>
        <nav>
            <a href="client.html">Home</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <section class="hero">
        <div class="welcome-text">
            <h2>Welcome</h2>
            <p>This website is used for CTU Daanbantayan Kalambuan Gymnatorium Booking System.</p>
            <button>READ MORE</button>
        </div>

        <div class="booking-form">
            <h3>Gym Booking Form</h3>
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <select id="eventType">
                <option value="">Event Type</option>
                <option value="Marriage">Marriage</option>
                <option value="Birthday">Birthday</option>
                <option value="Graduation">Graduation</option>
            </select>
            <label>Check In</label>
            <input type="date" id="checkIn">
            <label>Check Out</label>
            <input type="date" id="checkOut">
            <select id="guests">
                <option value="">Guests</option>
                <option value="1">10</option>
                <option value="2">20</option>
                <option value="3">30</option>
                <option value="3">40</option>
                <option value="3">50</option>
                <option value="3">60</option>
                <option value="3">70</option>
                <option value="3">80</option>
                <option value="3">90</option>
            </select>
            <button id="bookBtn">BOOK NOW</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
