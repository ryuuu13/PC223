
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gymnatorium Booking</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========== HEADER ========== -->
    <header>
        <div class="header-content">
            <div class="logo">Gymnatorium <span>Booking</span></div>
            <nav>
                <a href="booking.html">Home</a>
                <a href="booking.html#about">About</a>
                <a href="booking.html#services">Services</a>
                <a href="admin.html" class="text-accent">Admin</a>
            </nav>
        </div>
    </header>

    <!-- ========== ADMIN CONTAINER ========== -->
    <div class="admin-container">

        <!-- ========== HEADER SECTION ========== -->
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <button class="btn-danger btn-small" onclick="logout()">Logout</button>
        </div>

        <!-- ========== STATS SECTION ========== -->
        <div class="stats-bar" id="statsBar"></div>

        <!-- ========== TABLE SECTION ========== -->
        <div class="table-container">
            <div class="table-title">Reservations Management</div>
            <table id="bookingTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Event</th>
                        <th>Check-In</th>
                        <th>Check-Out</th>
                        <th>Guests</th>
                        <th>Days</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <p>No reservations yet</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        /**
         * Update statistics dashboard with booking data
         */
        function updateStats() {
            const bookings = JSON.parse(localStorage.getItem("bookings")) || [];
            const totalGuests = bookings.reduce((sum, booking) => sum + parseInt(booking.guests), 0);
            const totalDays = bookings.reduce((sum, booking) => sum + parseInt(booking.days), 0);

            document.getElementById("statsBar").innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-label">Total Bookings</div>
                    <div class="stat-value">${bookings.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-label">Total Guests</div>
                    <div class="stat-value">${totalGuests}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-label">Total Days</div>
                    <div class="stat-value">${totalDays}</div>
                </div>
            `;

            // Show/hide empty state based on bookings
            const emptyStateEl = document.getElementById("emptyState");
            emptyStateEl.style.display = bookings.length === 0 ? "block" : "none";
        }

        // Initialize stats on page load
        updateStats();
    </script>
</body>

</html>
